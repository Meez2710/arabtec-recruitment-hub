databases:
  - name: arabtec-db
    plan: free
    databaseName: arabtec
    user: arabtec

services:
  - type: web
    name: arabtec
    runtime: node
    plan: free
    region: oregon
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_OPTIONS
        value: --experimental-sqlite
      - key: NODE_VERSION
        value: "22.11.0"
      - key: DATABASE_URL
        fromDatabase:
          name: arabtec-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        value: ""
