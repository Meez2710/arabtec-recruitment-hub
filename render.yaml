databases:
  - name: arabtec-db
    plan: free
    databaseName: arabtec
    user: arabtec
  # Staging database — isolated from prod so staging tests never touch prod data.
  - name: arabtec-db-staging
    plan: free
    databaseName: arabtec_staging
    user: arabtec_staging

services:
  # ---------------- PRODUCTION ----------------
  - type: web
    name: arabtec
    runtime: node
    plan: free
    region: oregon
    rootDir: backend
    branch: main                 # prod tracks main
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      # NODE_OPTIONS=--experimental-sqlite removed: production uses PostgreSQL, so the
      # SQLite engine (and its experimental flag) is never loaded. Local SQLite dev uses
      # `npm run start:sqlite`. See docs/DEPLOYMENT.md.
      - key: NODE_VERSION
        value: "22.11.0"
      - key: NODE_ENV
        value: production
      # Trust exactly one proxy hop (Render's load balancer) so req.ip is the real
      # client IP and cannot be spoofed via X-Forwarded-For. See docs/SECURITY_HARDENING.md.
      - key: TRUST_PROXY
        value: "1"
      - key: DATABASE_URL
        fromDatabase:
          name: arabtec-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        value: "https://arabtec.onrender.com"
      # Demo sample-users are NOT seeded in production.
      - key: SEED_DEMO_DATA
        value: "false"
      # Error tracking — set the DSN value in the Render dashboard (do NOT commit it).
      # Absent = Sentry disabled (app runs normally).
      - key: SENTRY_DSN
        sync: false
      # --- Feature secrets: set VALUES in the Render dashboard, never in this file. ---
      # sync:false = "this key is required but its value is managed as a secret".
      # Full reference and which features each enables: docs/ENVIRONMENT_VARIABLES.md
      # Email (leave unset to keep email OFF):
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: MAIL_FROM
        sync: false
      - key: MAIL_FROM_NAME
        sync: false
      # AI CV parsing (leave unset to fall back to the heuristic parser):
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: DEEPSEEK_BASE_URL
        sync: false
      - key: DEEPSEEK_MODEL
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      # Uploads / CV watcher (set a persistent path once on VPS/Coolify):
      - key: UPLOAD_DIR
        sync: false
      - key: CV_INBOX
        sync: false
      - key: CV_WATCH_INTERVAL_MIN
        sync: false

  # ---------------- STAGING ----------------
  # Mirrors prod but tracks the `staging` branch and uses its own DB. A push to
  # `staging` auto-deploys here, replacing manual file uploads for verification.
  - type: web
    name: arabtec-staging
    runtime: node
    plan: free
    region: oregon
    rootDir: backend
    branch: staging
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      # NODE_OPTIONS=--experimental-sqlite removed: production uses PostgreSQL, so the
      # SQLite engine (and its experimental flag) is never loaded. Local SQLite dev uses
      # `npm run start:sqlite`. See docs/DEPLOYMENT.md.
      - key: NODE_VERSION
        value: "22.11.0"
      - key: NODE_ENV
        value: production
      # Trust exactly one proxy hop (Render's load balancer) so req.ip is the real
      # client IP and cannot be spoofed via X-Forwarded-For. See docs/SECURITY_HARDENING.md.
      - key: TRUST_PROXY
        value: "1"
      - key: DATABASE_URL
        fromDatabase:
          name: arabtec-db-staging
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        value: "https://arabtec-staging.onrender.com"
      # Staging may seed demo users for testing convenience.
      - key: SEED_DEMO_DATA
        value: "true"
      - key: SENTRY_DSN
        sync: false
