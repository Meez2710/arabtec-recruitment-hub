<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Arabtec Recruitment Hub</title>
  <link rel="icon" type="image/svg+xml" href="/logo.svg" />
  <!-- Optional web font; if blocked/offline the app falls back to system fonts (handled in CSS). -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" media="print" onload="this.media='all'" />
  <link rel="stylesheet" href="/styles.css?v=20260722" />
</head>
<body>
  <div id="root">
    <div class="boot-loading">Loading Arabtec Recruitment Hub…</div>
  </div>

  <!-- React + Babel served LOCALLY (no CDN dependency, works offline / behind blockers). -->
  <script src="/vendor/react.production.min.js"></script>
  <script src="/vendor/react-dom.production.min.js"></script>
  <script src="/vendor/babel.min.js"></script>

  <!-- Cache-bust app.jsx (the whole SPA lives here). Bump ?v= on every UI change so a
       browser/proxy can never serve a stale build — this is what made the app appear to
       "revert" to an old version after edits. Keep in sync with styles.css version. -->
  <script type="text/babel" src="/app.jsx?v=20260722"></script>
</body>
</html>
